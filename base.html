<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera</title>
    <style>
        #store {
            position: absolute; 
            top: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.8); 
            padding: 15px;
            border-radius: 8px; 
            color: white; 
            z-index: 10;
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }
        .storeitem {
            background: #34495e; 
            border: 2px solid #2c3e50; 
            color: white;
            padding: 10px; 
            cursor: pointer; 
            border-radius: 5px; 
            text-align: left;
        }
        .storeitem:hover { background: #455a64; }
        .storeitem.selected { border-color: #f1c40f; background: #2ecc71; color: #000; font-weight: bold;}
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #2c3e50;
            font-family: monospace;
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        #uilayer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="uilayer">
        Camera: <span id="coords">0, 0</span><br>
        <div>Bio Coins: <span id="coindisplay">0</span></div>
        Tile Stats: <span id="hover-stats">Hover over a tile</span>
    </div>
    <div id="store">
        <h3 style="margin:0; border-bottom:1px solid #7f8c8d; padding-bottom:5px;">Seed Shop</h3>
        <button class="storeitem selected" onclick="selectSeed('fern', this)">Giuguggag - 10c</button>
        <button class="storeitem" onclick="selectSeed('cactus', this)">Cactus - 50c</button>
        <button class="storeitem" onclick="selectSeed('pine', this)">Pine - 200c</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/perlin-js/1.0.0/perlin.js"></script>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const coordsText = document.getElementById('coords');
        const hoverText = document.getElementById('hover-stats');

        const sprites = {
            seed: new Image(),
            sprout: new Image(),
            fern: new Image(),
            desertFern: new Image(),
            cactus: new Image(),
            pine: new Image()
        };
        sprites.seed.src = "images/seed.png";
        sprites.sprout.src = "images/sprout.png";
        sprites.fern.src = "images/fern.png";
        sprites.cactus.src = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='35' y='20' width='30' height='70' rx='15' fill='%232E7D32'/%3E%3C/svg%3E";
        sprites.pine.src = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,10 20,80 80,80' fill='%231B4F72'/%3E%3C/svg%3E";
        sprites.desertFern.src = "images/download.png";
        // perkin noise fn i copied it here in case the CDN is unreachable
        if (typeof noise === 'undefined') {
            window.noise = {
                seed: function() {},
                perlin2: function(x, y) {
                    let X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
                    x -= Math.floor(x); y -= Math.floor(y);
                    let u = x * x * x * (x * (x * 6 - 15) + 10), v = y * y * y * (y * (y * 6 - 15) + 10);
                    const n = (i, j) => {
                        let s = Math.sin((i & 255) * 12.9898 + (j & 255) * 78.233) * 43758.5453123;
                        return s - Math.floor(s);
                    };
                    let a = n(X, Y), b = n(X + 1, Y), c = n(X, Y + 1), d = n(X + 1, Y + 1);
                    return (a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v) * 2 - 1;
                }
            };
            console.warn("Perlin CDN unreachable. Switched to native fallback.");
        }
        // perkin noise above dont touch
        const TILE_SIZE = 80;
        let camera = { x: 0, y: 0 };
        let worldseed = Math.random();
        let activetiles = {};
        let coins = 0;
        const coinText = document.getElementById('coindisplay');
        
        const catalog = {
            fern: {type: "Fern", idealmoist: 50, biome: "Plains", baseearn: 1, cost: 10, color: "#2ecc71"},
            cactus: { type: "Cactus", biome: "Desert", idealmoist: 10, cost: 50, color: "#27ae60", baseearn: 5 },
            pine:   { type: "Pine", biome: "Tundra", idealmoist: 80, cost: 200, color: "#1B4F72", baseearn: 25 }
        };
        let currentseed = 'fern';
        function selectSeed(seedKey, btnElement) {
            currentseed = seedKey;
            document.querySelectorAll('.storeitem').forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');
        }

        function seededRandom(x, y) {
            let n = Math.sin(x * 13 + y * 70) * 300;
            return n - Math.floor(n);
        }

        function gettileat(tileX, tileY) {
            const scale = 0.2; 
            const moistnoise = noise.perlin2(tileX * scale, tileY * scale);
            const sunnoise = noise.perlin2((tileX + 100) * scale, (tileY + 100) * scale);
            
            let moisture = Math.floor((moistnoise + 1) * 50);
            const sunlight = Math.floor((sunnoise + 1) * 50);
            let biome = 'Plains';
            
            if (moisture < 25 && sunlight > 70) biome = 'Desert';
            if (moisture < 40 && sunlight < 40) biome = 'Tundra';
            if (moisture > 70 && sunlight > 70 && moisture < 90 ) biome = 'Rainforest';
            if (moisture > 90 && sunlight > 70) biome = 'River';
            
            let rand = seededRandom(tileX, tileY);
            let type = 'Grass';
            let color = '#4CAF50';

            if (biome === 'Desert') {
               type = (rand < 0.55) ? 'Sand' : 'Stone';
               color = (type === 'Sand') ? '#E6C280' : '#7F8C8D';
               if (type === 'Sand') {
                const range = 20 - 2 + 1;
                moisture = Math.floor(rand * range) + 2;
               } else {
                const range = 15 - 5 + 1;
                moisture = Math.floor(rand * range) + 5;
               }
            } else if (biome === 'Tundra') {
               type = (rand < 0.65) ? 'Snow' : 'Ice';
               color = (type === 'Snow') ? '#F2F4F4' : '#AED6F1';
               if (type === 'Snow') {
                const range = 100 - 90 + 1;
                moisture = Math.floor(rand * range) + 90;
               } else {
                const range = 100 - 95 + 1;
                moisture = Math.floor(rand * range) + 95;
               }
            } else if (biome === 'Rainforest') {
               type = (rand < 0.45) ? 'Dense Grass' : 'Mud';
               color = (type === 'Dense Grass') ? '#196F3D' : '#6E473B';
            } else if (biome === 'River') {
               type = (rand < 0.5) ? 'Shallow Water' : 'Deep Water';
               color = (type === 'Shallow Water') ? '#5DADE2' : '#2E86C1';
               if (type === 'Shallow Water') {
                const range = 90 - 80 + 1;
                moisture = Math.floor(rand * range) + 80;
               } else {
                const range = 100 - 90 + 1;
                moisture = Math.floor(rand * range) + 90;
               }
            }
            else {
               if (rand > 0.99) { type = 'Water'; color = '#3498DB';
                if (type === 'Water') {
                const range = 100 - 90 + 1;
                moisture = Math.floor(rand * range) + 90;
               }
                }
               else if (rand > 0.99) { type = 'Stone'; color = '#7F8C8D';
                if (type === 'Stone') {
                const range = 100 - 90 + 1;
                moisture = Math.floor(rand * range) + 0;
               }
                }
            }
            return { type, biome, moisture, sunlight, color }; 
        }
        window.addEventListener('keydown', (e) => {
        if (e.shiftKey && e.key.toLowerCase() === 'r') {
            localStorage.removeItem('terrasave');
           location.reload(); 
        }
    });

        function savegame(){
            const saveData = {
                cam : camera,
                seed : worldseed,
                tiles: activetiles,
                money: coins
            };
            localStorage.setItem('terrasave', JSON.stringify(saveData));
        }

        function loadgame(){
            const savestr = localStorage.getItem('terrasave'); 
            if (savestr) {
                const saveData = JSON.parse(savestr); 
                camera = saveData.cam;
                worldseed = saveData.seed;
                activetiles = saveData.tiles || {};
                coins = saveData.money || 0;
                console.log("Game loaded!");
            } else {
                worldseed = Math.random();
                console.log("No save found, new world generated.");
            }
            noise.seed(worldseed);
            coinText.innerText = coins;
        }

        window.addEventListener('load', () => {
            loadgame();
            resizeCanvas();
            function loop() {
                draw();
                requestAnimationFrame(loop);
            }
            loop();
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        let isDragging = false;
        let hasdragged = false;
        let dragStart = { x: 0, y: 0 };
        let mousePos = { x: 0, y: 0 };
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            hasdragged = false;
            dragStart = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('mousemove', (e) => {
            mousePos = { x: e.clientX, y: e.clientY };

            if (isDragging) {
                const dx = e.clientX - dragStart.x;
                const dy = e.clientY - dragStart.y;
                camera.x -= dx;
                camera.y -= dy;
                dragStart = { x: e.clientX, y: e.clientY };
                coordsText.innerText = `${Math.floor(camera.x)}, ${Math.floor(camera.y)}`;
                
                if (Math.abs(dx) > 0 || Math.abs(dy) > 0) {
                    hasdragged = true;
                }
            }

            const worldX = mousePos.x + camera.x;
            const worldY = mousePos.y + camera.y;
            const tileX = Math.floor(worldX / TILE_SIZE);
            const tileY = Math.floor(worldY / TILE_SIZE);
            const currenttile = gettileat(tileX, tileY);
            hoverText.innerText = `[${tileX}, ${tileY}] Biome: ${currenttile.biome} (${currenttile.type}) | Moisture: ${currenttile.moisture}% | Sunlight: ${currenttile.sunlight}%`;
        });

        canvas.addEventListener('mouseup', (e) =>{ 
            isDragging = false;
            if(!hasdragged) {
                const worldX = e.clientX + camera.x;
                const worldY = e.clientY + camera.y;
                const tileX = Math.floor(worldX / TILE_SIZE);
                const tileY = Math.floor(worldY / TILE_SIZE);
                const key = `${tileX},${tileY}`;
                const terrain = gettileat(tileX, tileY);
                
                if (!activetiles[key] && terrain.type !== 'Water') {
                    const toplant = catalog[currentseed];
                        if (coins >= toplant.cost) {
                            coins -= toplant.cost;
                            coinText.innerText = coins;
                            activetiles[key] = {
                                type: toplant.type,
                                growth: 0,
                                idealmoist: toplant.idealmoist,
                                biome: toplant.biome,
                                multiplier: 1,
                                color: toplant.color
                            };
                            savegame();
                        } else {
                            hoverText.innerText = `Not enough Bio Coins! ${toplant.cost} needed to plant ${toplant.type}.`;
                            alert("Not enough Bio Coins!");
                        }
                }
            }
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            hasdragged = false;
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const startCol = Math.floor(camera.x / TILE_SIZE);
            const endCol = startCol + (canvas.width / TILE_SIZE) + 1;
            const startRow = Math.floor(camera.y / TILE_SIZE);
            const endRow = startRow + (canvas.height / TILE_SIZE) + 1;

            const offsetX = -camera.x + (startCol * TILE_SIZE);
            const offsetY = -camera.y + (startRow * TILE_SIZE);
            ctx.fillStyle = "#1a252c";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let c = 0; c <= (endCol - startCol); c++) {
                for (let r = 0; r <= (endRow - startRow); r++) {
                    const tileX = startCol + c;
                    const tileY = startRow + r;
                    const x = (c * TILE_SIZE) + offsetX;
                    const y = (r * TILE_SIZE) + offsetY;

                    const tile = gettileat(tileX, tileY);
                    ctx.fillStyle = darkenColor(tile.color, 40);
                    ctx.fillRect(x, y + 8, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = tile.color;
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = "rgba(255,255,255,0.1)";
                    ctx.fillRect(x, y, TILE_SIZE, 4);
                    let detailrand = seededRandom(tileX * Math.PI , tileY * Math.E);
                    if (tile.biome === "Plains" && detailrand > 0.8) {
                        ctx.fillStyle = "#27ae60";
                        ctx.fillRect(x + 10, y + 10, 5, 12);
                        ctx.fillRect(x + 20, y + 15, 5, 10);
                    } else if (tile.biome === 'Rainforest' && detailrand > 0.7) {
                        ctx.fillStyle = "#145A32"; ctx.beginPath(); ctx.arc(x+40, y+40, 20, 0, Math.PI*2); ctx.fill();
                    } else if (tile.biome === 'Desert' && detailrand > 0.9) {
                        ctx.fillStyle = "#6E2C00"; ctx.fillRect(x + 30, y + 54, 15, 10); 
                        ctx.fillStyle = "#A04000"; ctx.fillRect(x + 30, y + 50, 15, 10); 
                    }
                    
                    const key = `${tileX},${tileY}`;
                    const plant = activetiles[key];
                    
                    if (plant) {
                        let currentSprite;

                        
                        if (plant.growth < 30) {
                            currentSprite = sprites.seed;
                        } else if (plant.growth < 80) {
                            currentSprite = sprites.sprout;
                        } else {
                            if (plant.type === "Desert Fern") {
                                currentSprite = sprites.desertFern;
                            } else {
                                if(plant.type === "Cactus"){
                                    currentSprite = sprites.cactus;
                                } else if (plant.type === "Pine"){
                                    currentSprite = sprites.pine;
                                } else
                                currentSprite = sprites.fern;
                            }
                        }

                        if (currentSprite && currentSprite.complete && currentSprite.naturalWidth !== 0) {
                            const padding = 10;
                            let currentpadding = 10;
                            if (plant.isdying){
                                plant.opacity -= 0.02;
                                if (plant.opacity <= 0){
                                    delete activetiles[key];
                                    continue;
                                }
                                ctx.globalAlpha = plant.opacity;
                                currentpadding = 10 + (1 - plant.opacity) * 25;
                            }else {
                                ctx.globalAlpha = 1;
                            }
                            ctx.drawImage(
                                currentSprite, 
                                x + currentpadding, 
                                y + currentpadding, 
                                TILE_SIZE - (currentpadding * 2), 
                                TILE_SIZE - (currentpadding * 2)
                            );
                            ctx.globalAlpha = 1;
                            if (plant.multiplier > 1 && !plant.isdying) {
                                ctx.strokeStyle = "rgba(241, 196, 15, 0.8)";
                                ctx.lineWidth = 3;
                                ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                            }
                            
                        }
                    }
                }
            }
        }
        const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height/3, canvas.width/2, canvas.height/2, canvas.width, canvas.height);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        function darkenColor(color, percent) {
            let num = parseInt(color.replace("#",""), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) - amt,
            G = (num >> 8 & 0x00FF) - amt,
            B = (num & 0x0000FF) - amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
        }
        function tick() {
            let needssave = false; 
            for(const key in activetiles){
                const plant = activetiles[key];
                if(plant.isdying) continue;
                const [x,y] = key.split(',').map(Number);
                const tiledata = gettileat(x,y);
                const moistureDiff = Math.abs(tiledata.moisture - plant.idealmoist);
                if(plant.growth < 100){
                    
                    if (moistureDiff < 20 && tiledata.sunlight > 50 && tiledata.biome == plant.biome){
                        plant.growth += 10;
                    } else if (moistureDiff < 40 && tiledata.sunlight < 30 || tiledata.biome == plant.biome){
                        plant.growth += 2;
                    } else {
                        if (Math.random() < 0.4){
                            plant.type = "Desert Fern";
                            plant.idealmoist = tiledata.moisture;
                            plant.biome = tiledata.biome == "Desert" ? "Desert" : tiledata.biome == "Tundra" ? "Tundra" : "Rainforest";
                            plant.multiplier = 5; 
                            plant.color = "#f1c40f"; 
                            plant.growth += 10; 
                            console.log(`MUTATION at ${key}!`);
                        } else {
                            plant.isdying = true;
                            plant.opacity = 1;
                            console.log(`A plant withered away at ${key}`);
                            needssave = true;
                            coins = Math.max(0,coins - 30 );
                            continue;
                        }
                    }
                    
                    if (plant.growth >= 100) plant.growth = 100;
                    needssave = true;
                    } else {
                        let earnings = plant.baseearn || 1;
                        if(plant.multiplier>1){
                            earnings *= plant.multiplier;
                        }
                        coins += earnings;
                        needssave = true;
                    }
                    
                }
                if (needssave) {
                coinText.innerText = coins;
                savegame();
            }
            
            }
        setInterval(tick, 1000);
    </script>
</body>
</html>
