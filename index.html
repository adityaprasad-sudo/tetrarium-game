<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera 3D</title>
    <style>
        body { margin: 0; 
            overflow: hidden;
            background-color: #050505; 
            font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        .uilay{
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #menu{background-color: rgba(5,5,5,0.9);}
        .title{
            color: #8b0000;
            font-size: 5rem;
            letter-spacing:10px;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 50px;

        }
        .menubtn{
            display: flex;
            flex-direction:column;
            gap: 20px;
        }
        button{
            background: none;
            border: 2px solid #333;
            color: #888;
            padding: 15px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover{
            border-color: #8b0000;
            color: #fff;
            background-color: rgba(139,0,0,0.2);
            transform: scale(1.05)
        }
        #loadingscr{
            background-color: #050505;
            color: #555;
        }
        .loadingtxt{font-size:2rem; letter-spacing: 5px; animation: pulse 1.5s infinite;}
        @keyframes pulse{
            0%{opacity: 0.3}
            50%{opacity: 1}
            100%{opacity: 0.3}
        }
        #hud{
            pointer-events: none;
            justify-content: flex-start;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    
    <div id="menu" class="uilay">
        <h1 class="title">Terrarium</h1>
        <div class="menubtn">
            <button id = "btnplay">PLAY</button>
            <button id = "settings">SETTINGS</button>
            <button id = "about">ABOUT</button>
        </div>
    </div>
    <div id = "loadingscr" class="uilay" style="display: none">
        <h2 class="loadingtxt">LOADING BACKROOMS</h2>
        <div class="spinner"></div>
    </div>
    <div id = "hud" class="uilay" style="display:none">
        <h1 id="timothy" style = "display:none; color: red; ">GOD MODE: </h1>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/perlin-js/1.0.0/perlin.js"></script>
    
    <script type = "module" src="js/mechanism.js"></script>
    <script  src="js/menu.js"></script>
</body>
</html>
