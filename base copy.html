<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera 3D</title>
    <style>
        #crafting {
            position: absolute; 
    top: 10px; left: 250px; 
    background: rgba(0, 0, 0, 0.8); 
    padding: 15px; border-radius: 8px; color: white; 
    z-index: 10; display: flex; flex-direction: column; gap: 10px;
        }
        .craft-btn {
            background: #c4a78fd3; 
            border: 2px solid #ffffff;  
            cursor: pointer; 
            border-radius: 5px; 
            text-align: left;
            font-size: 12px;
            font-weight: 900;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 35px;
            border: 5px solid #000000;
            border-radius: 20px; 
            
            box-shadow: 8px 8px 0px #000000; 
            
            cursor: pointer;
            transition: all 0.1s ease-in-out;
        }

.craft-btn:hover { transform: translate(-2px, -2px); box-shadow: 10px 10px 0px #000000; }
.craft-btn.owned { transform: translate(8px, 8px); box-shadow: 0px 0px 0px #000000;}
        #store {
            position: absolute; 
            top: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.8); 
            padding: 15px;
            border-radius: 8px; 
            color: white; 
            z-index: 10;
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }
        .storeitem {
            background: #34495e; 
            border: 2px solid #2c3e50; 
            color: white;
            padding: 10px; 
            cursor: pointer; 
            border-radius: 5px; 
            text-align: left;
        }
        .storeitem:hover { background: #455a64; }
        .storeitem.selected { border-color: #f1c40f; background: #2ecc71; color: #000; font-weight: bold;}
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #1a252c;
            font-family: monospace;
        }
        canvas {
            display: block;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        #uilayer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none; 
            z-index: 10;
        }
    </style>
</head>
<body>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/perlin-js/1.0.0/perlin.js"></script>
    
    <script src="js/mechanism.js"></script>
</body>
</html>
